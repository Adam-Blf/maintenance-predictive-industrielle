# Streamlit theme · charte EFREI Paris
# primaryColor     = rose signature EFREI #FF43B8 (CTAs, sliders, radio, onglets actifs)
# backgroundColor  = blanc pur #FFFFFF
# secondaryBg      = gris clair #F4F4F4 (sidebar, code blocks)
# textColor        = anthracite #212121 (contraste 16:1 sur blanc)
# font             = sans serif (Poppins chargé via @import CSS dans app.py)

[theme]
base            = "light"
primaryColor    = "#FF43B8"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F4F4F4"
textColor       = "#212121"
font            = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless = true
port     = 8501
