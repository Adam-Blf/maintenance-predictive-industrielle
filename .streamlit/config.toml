# Theme Streamlit · charte officielle EFREI
# primaryColor     = rose signature #FF43B8 (CTAs, sliders, radio)
# backgroundColor  = blanc pur #FFFFFF
# secondaryBg      = gris clair #F4F4F4 (sidebar, code blocks)
# textColor        = anthracite #212121
# font             = sans serif (Plus Jakarta Sans injecté via CSS custom)

[theme]
base            = "light"
primaryColor    = "#FF43B8"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F4F4F4"
textColor       = "#212121"
font            = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless = true
