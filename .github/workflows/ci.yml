name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Ruff lint
        run: ruff check src/ scripts/ dashboard/ api/ tests/ || true

      - name: Pytest (smoke + unit)
        run: |
          pytest tests/ --cov=src --cov-report=term --maxfail=5 -q

      - name: Build report PDF (artifact)
        run: |
          python scripts/01_generate_dataset.py
          python scripts/02_eda.py
          python scripts/05_generate_diagrams.py
          python scripts/03_train_models.py
          python scripts/04_interpret.py
          python scripts/06_generate_report.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: rapport-pdf
          path: reports/rapport_projet_data_science.pdf
          retention-days: 30
